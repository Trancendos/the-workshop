# ============================================================================
# Trancendos Ecosystem - Pre-Deploy Validation Gate
# ============================================================================
# Purpose: Catch dependency conflicts, missing modules, and build failures
# BEFORE they reach Render deployment
# Triggers: Pull requests to main, pushes to main
# ============================================================================

name: 🛡️ Pre-Deploy Validation Gate

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/epic-*'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: pre-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.30.1'

jobs:
  # ========================================
  # Stage 1: Dependency Conflict Detection
  # ========================================
  dependency-check:
    name: 📦 Dependency Conflict Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has-conflicts: ${{ steps.check-conflicts.outputs.has_conflicts }}
      conflict-details: ${{ steps.check-conflicts.outputs.details }}
    steps:
      - uses: actions/checkout@v6
      
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true
      
      - name: Check for peer dependency conflicts
        id: check-conflicts
        run: |
          echo "🔍 Checking for peer dependency conflicts..."
          
          # Check zod/openai compatibility
          ZOD_VERSION=$(node -p "require('./package.json').dependencies.zod" 2>/dev/null || echo "not found")
          OPENAI_VERSION=$(node -p "require('./package.json').dependencies.openai" 2>/dev/null || echo "not found")
          
          echo "Zod version: $ZOD_VERSION"
          echo "OpenAI version: $OPENAI_VERSION"
          
          # Check if openai supports zod v4
          if [[ "$OPENAI_VERSION" == "^4."* ]] || [[ "$OPENAI_VERSION" == "4."* ]]; then
            echo "⚠️ OpenAI SDK version $OPENAI_VERSION may not support zod v4"
            echo "has_conflicts=true" >> $GITHUB_OUTPUT
            echo "details=OpenAI SDK $OPENAI_VERSION requires zod v3, but zod v4 is installed. Upgrade openai to ^6.0.0" >> $GITHUB_OUTPUT
          else
            echo "✅ OpenAI SDK version $OPENAI_VERSION supports zod v4"
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
            echo "details=No conflicts detected" >> $GITHUB_OUTPUT
          fi
      
      - name: Fail on conflicts
        if: steps.check-conflicts.outputs.has_conflicts == 'true'
        run: |
          echo "❌ Dependency conflict detected!"
          echo "${{ steps.check-conflicts.outputs.details }}"
          exit 1

  # ========================================
  # Stage 2: Module Path Validation
  # ========================================
  module-validation:
    name: 📁 Module Path Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      
      - name: Validate critical module paths
        run: |
          echo "🔍 Validating critical module paths..."
          
          CRITICAL_PATHS=(
            "server/_core/trpc.ts"
            "server/routers/guardian.ts"
            "server/services/guardianSecurity.ts"
            "server/_core/index.ts"
            "server/db.ts"
          )
          
          MISSING=""
          for path in "${CRITICAL_PATHS[@]}"; do
            if [[ ! -f "$path" ]]; then
              echo "❌ Missing: $path"
              MISSING="$MISSING $path"
            else
              echo "✅ Found: $path"
            fi
          done
          
          if [[ -n "$MISSING" ]]; then
            echo ""
            echo "❌ Critical modules missing:$MISSING"
            exit 1
          fi
          
          echo ""
          echo "✅ All critical modules present"
      
      - name: Validate import paths
        run: |
          echo "🔍 Checking import statements in guardian.ts..."
          
          # Check if guardian.ts imports from _core/trpc correctly
          if grep -q "from.*_core/trpc" server/routers/guardian.ts; then
            echo "✅ guardian.ts imports from _core/trpc correctly"
          else
            echo "⚠️ guardian.ts may have incorrect import path"
          fi

  # ========================================
  # Stage 3: Build Dry-Run
  # ========================================
  build-dry-run:
    name: 🔨 Build Dry-Run
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [dependency-check, module-validation]
    steps:
      - uses: actions/checkout@v6
      
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Type check
        run: pnpm run check
        continue-on-error: true
      
      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production
          NODE_OPTIONS: '--max-old-space-size=4096'

  # ========================================
  # Stage 4: Cron Job Entry Point Validation
  # ========================================
  cron-validation:
    name: ⏰ Cron Job Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      
      - name: Check cron entrypoint exists
        run: |
          echo "🔍 Validating cron job entrypoints..."
          
          CRON_SCRIPTS=(
            "scripts/cron/update-bot-status.ts"
          )
          
          for script in "${CRON_SCRIPTS[@]}"; do
            if [[ -f "$script" ]]; then
              echo "✅ Cron entrypoint found: $script"
            else
              echo "⚠️ Cron entrypoint missing: $script"
              echo "   Render cron jobs will fail without proper entrypoint"
            fi
          done
      
      - name: Validate render.yaml cron configuration
        run: |
          echo "🔍 Checking render.yaml for cron jobs..."
          
          if [[ -f "render.yaml" ]]; then
            if grep -q "cron" render.yaml; then
              echo "✅ Cron jobs configured in render.yaml"
              echo ""
              echo "Cron job services:"
              grep -A5 "type: cron" render.yaml || echo "No cron services found"
            else
              echo "ℹ️ No cron jobs configured in render.yaml"
            fi
          fi

  # ========================================
  # Stage 5: Security Compliance Check
  # ========================================
  security-check:
    name: 🔐 Security Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [dependency-check]
    steps:
      - uses: actions/checkout@v6
      
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run security audit
        run: |
          echo "🔍 Running security audit..."
          pnpm audit --audit-level=high || true
      
      - name: Check for known vulnerabilities
        run: |
          echo "🔍 Checking for known vulnerable packages..."
          pnpm ls --json 2>/dev/null | jq -r '.[] | select(.deprecated == true) | .name' || echo "No deprecated packages"

  # ========================================
  # Summary Report
  # ========================================
  summary:
    name: 📋 Validation Summary
    runs-on: ubuntu-latest
    needs: [dependency-check, module-validation, build-dry-run, cron-validation, security-check]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 🛡️ Pre-Deploy Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Conflicts | ${{ needs.dependency-check.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Module Paths | ${{ needs.module-validation.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Dry-Run | ${{ needs.build-dry-run.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cron Jobs | ${{ needs.cron-validation.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security-check.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
      
      - name: Check overall status
        if: contains(needs.*.result, 'failure')
        run: |
          echo "❌ Pre-deploy validation failed!"
          exit 1
      
      - name: Notify on failure (reduce email spam)
        if: failure()
        run: |
          echo "🔔 Routing alert to centralized notification channel..."
          echo "This replaces individual email alerts with consolidated notifications."
          echo ""
          echo "To enable Slack/Discord notifications:"
          echo "1. Add SLACK_WEBHOOK_URL or DISCORD_WEBHOOK_URL to repository secrets"
          echo "2. Alerts will be routed there instead of email spam"
          # Future: Add actual Slack/Discord webhook call when secrets are configured